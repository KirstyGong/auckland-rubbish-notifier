name: Rubbish Collection Notifier

on:
  schedule:
    # Run daily at 5pm NZT
    # NZT is UTC+12 (winter) or UTC+13 (summer/daylight saving)
    # 5pm NZST = 5am UTC, 5pm NZDT = 4am UTC
    # Using 4am UTC to cover daylight saving
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send test notification (ignores actual bin day)'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and notify
        env:
          AUCKLAND_STREET: ${{ secrets.AUCKLAND_STREET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python -m src.main
