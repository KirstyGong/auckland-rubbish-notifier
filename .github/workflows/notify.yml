name: Rubbish Collection Notifier

on:
  schedule:
    # Run hourly to cover 7am-10pm NZT (both standard/daylight saving)
    # UTC 0-10 = NZT 12pm-10pm (std) / 1pm-11pm (dst)
    # UTC 18-23 = NZT 6am-11am (std) / 7am-12pm (dst)
    - cron: '0 0-10,18-23 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send test notification (ignores actual bin day)'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and notify
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python -m src.main
