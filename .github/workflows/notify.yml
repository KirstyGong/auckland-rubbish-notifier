name: Rubbish Collection Notifier

on:
  schedule:
    # Run hourly from 2am-8am UTC (covers 3pm-9pm NZT range)
    # Actual notification only sent at NOTIFY_HOUR (default: 17 = 5pm NZT)
    # This allows configurable notification time via GitHub variable
    - cron: '0 2,3,4,5,6,7,8 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send test notification (ignores actual bin day)'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and notify
        env:
          AUCKLAND_STREET: ${{ secrets.AUCKLAND_STREET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFY_HOUR: ${{ vars.NOTIFY_HOUR || '17' }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python -m src.main
